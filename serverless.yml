service: chore-chart

frameworkVersion: "4"

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'us-east-1'}
  stage: ${opt:stage, 'dev'}
  profile: default
  environment:
    TODOS_TABLE: ${self:service}-${self:provider.stage}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Scan
          Resource:
            - !GetAtt TodosTable.Arn

# --- sls functions: one Lambda per route, wired to API Gateway ---
functions:
  createTodo:
    handler: src/handlers/create.handler
    events:
      - httpApi:
          path: /todos
          method: post

  listTodos:
    handler: src/handlers/list.handler
    events:
      - httpApi:
          path: /todos
          method: get

  getTodo:
    handler: src/handlers/get.handler
    events:
      - httpApi:
          path: /todos/{id}
          method: get

  updateTodo:
    handler: src/handlers/update.handler
    events:
      - httpApi:
          path: /todos/{id}
          method: put

  deleteTodo:
    handler: src/handlers/delete.handler
    events:
      - httpApi:
          path: /todos/{id}
          method: delete

resources:
  Resources:
    TodosTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.TODOS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH

  Outputs:
    ApiBaseUrl:
      Description: API Gateway base URL
      Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}"
